<!doctype html>
<html lang="en">
  <head>
    <script>
      window.__APP_CONFIG__ = {
        "productName": "antigravity",
        "csrfToken": "82d78d3c-a359-4d23-82ff-7cb0db7fcbeb",
        "appVersion": "2.3.1",
        "devMode": false
      };

      // Web Polyfill for Electron Native APIs
      (function() {
        const storageListeners = new Set();
        let storageData = {};
        try {
          storageData = JSON.parse(localStorage.getItem('antigravity_native_storage') || '{}');
        } catch(e) {
          storageData = {};
        }

        window.nativeStorage = {
          getItems: async () => storageData,
          updateItems: async (changes) => {
            Object.assign(storageData, changes);
            try {
              localStorage.setItem('antigravity_native_storage', JSON.stringify(storageData));
            } catch(e) {}
            storageListeners.forEach(cb => cb(changes));
          },
          onChanged: (callback) => {
            storageListeners.add(callback);
            return () => storageListeners.delete(callback);
          }
        };

        window.nativeNotifications = {
          send: async (options) => { console.log('[Notification]', options); },
          openSystemPreferences: async () => {},
          onClicked: (cb) => () => {}
        };

        window.dialog = {
          showOpenDialog: async () => ({ canceled: true, filePaths: [] })
        };

        window.electronUpdater = {
          onStateChanged: (cb) => () => {},
          applyUpdate: async () => {},
          quitAndInstall: async () => {},
          checkForUpdates: async () => {},
          getState: async () => ({ status: 'idle' })
        };

        window.electronNative = {
          getZoomLevel: () => 1,
          setTitleBarOverlay: async () => {},
          minimize: async () => {},
          maximize: async () => {},
          unmaximize: async () => {},
          isMaximized: async () => false,
          close: async () => {},
          toggleDevTools: async () => {},
          zoomIn: () => {},
          zoomOut: () => {},
          resetZoom: () => {},
          openExternal: (url) => window.open(url, '_blank'),
          revealInFilePicker: async () => {}
        };

        window.logs = {
          getElectronLogs: async () => []
        };

        window.extensions = {
          sendAuthorities: async () => {}
        };

        window.deepLink = {
          onDeepLink: (cb) => () => {},
          getStoredDeepLink: async () => null
        };

        window.agent = {
          updateActiveAgentCount: async () => {}
        };

        window.ide = {
          isInstalled: async () => false
        };

        // Guard AudioWorklet module loading safely on AudioWorklet prototype
        if (typeof window !== 'undefined' && window.AudioWorklet && window.AudioWorklet.prototype) {
          const origAddModule = window.AudioWorklet.prototype.addModule;
          window.AudioWorklet.prototype.addModule = function(url, options) {
            return origAddModule.call(this, url, options).catch(err => {
              console.warn('[AudioWorklet] Handled worklet module load warning:', err);
              return Promise.resolve();
            });
          };
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <title>Antigravity React Web App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://www.gstatic.com" />
    <link rel="preconnect" href="https://ssl.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@vscode/codicons@0.0.36/dist/codicon.min.css" />
    <script>
      window.process = window.process || {};
      window.process.env = window.process.env || {};
      if (!window.process.env.NODE_ENV) {
        window.process.env.NODE_ENV = 'production';
      }
      if (window.customElements) {
        const originalDefine = window.customElements.define;
        window.customElements.define = (name, constructor, options) => {
          if (!window.customElements.get(name)) {
            originalDefine.call(window.customElements, name, constructor, options);
          }
        };
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/jetbox.css" />
    <link rel="stylesheet" href="/compiled_tailwind.css" />
    <style>
      html,
      body {
        height: 100%;
        background-color: #0d0e11;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      .google-symbols,
      .material-symbols-outlined,
      .material-symbols-rounded {
        font-family: 'Material Symbols Outlined', 'Material Symbols Rounded', sans-serif;
        font-weight: normal;
        font-style: normal;
        font-size: 16px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
      }
    </style>
  </head>

    <script src="/main.js"></script>
  </body>
</html>
